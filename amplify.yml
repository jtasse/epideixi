# Used when Amplify app root is the repository root (monorepo checkbox OFF).
# If monorepo app root is apps/web, Amplify uses apps/web/amplify.yml instead (baseDirectory: dist).
# See docs/hosting-amplify.md.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: apps/web/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customRedirects:
    - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json|webp)$)([^.]+$)/>'
      target: '/index.html'
      status: '200'
